version: "3.9"

services:
  faers-dashboard:
    build:
      context: ..            # project root
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Uncomment and set for cloud storage paths:
      # - FAERS_PARQUET_DIR=/dbfs/mnt/faers/parquet_recent
      # - FAERS_CACHE_DIR=/dbfs/mnt/faers/cache
      # - ANTHROPIC_API_KEY=your_key_here
    restart: unless-stopped
    volumes:
      # Mount live data without rebuilding the image
      - ../data/parquet_recent:/app/data/parquet_recent:ro
      - ./cache:/app/dashboard/cache:ro
