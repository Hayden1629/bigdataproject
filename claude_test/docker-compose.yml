version: "3.9"

services:
  faers-dashboard:
    build:
      context: ..            # project root
      dockerfile: claude_test/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    # Volume mount lets you update parquet data without rebuilding the image
    volumes:
      - ../data/parquet_recent:/app/data/parquet_recent:ro
      - ../claude_test/cache:/app/claude_test/cache:ro
